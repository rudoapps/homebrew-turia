# ─────────────────────────────────────────────────────────────────────────────
# claude_pool.conf — Pool de skills/plugins de Claude Code por tipo de proyecto.
#
# Lo usa `gula` (sin argumentos): detecta el tipo de proyecto de la carpeta
# actual, instala de aquí las skills que falten en Claude Code y arranca `claude`.
#
# Formato (una regla por línea, campos separados por '|'):
#   <tipo>|<plugin@marketplace>|<descripción corta>
#
#   <tipo>  : android | ios | flutter | python | typescript | php | go | rust
#             (mismos nombres que detecta detect_claude_project_types)
#   <plugin@marketplace> : se pasa tal cual a `claude plugin install`
#   <descripción>        : texto informativo mostrado al usuario
#
# Un mismo <tipo> puede tener varias líneas → se instalan todas sus skills.
# Líneas que empiezan por '#' y líneas vacías se ignoran.
# Añadir una skill = añadir una línea. Nada más.
# ─────────────────────────────────────────────────────────────────────────────

python|fwk-python@atenea-python-skills|Skills de microservicios Python (Mercadona FWK)
ios|swift-lsp@claude-plugins-official|Language server para Swift / iOS
android|kotlin-lsp@claude-plugins-official|Language server para Kotlin / Android
android|jdtls-lsp@claude-plugins-official|Language server para Java (Gradle/Android)
typescript|typescript-lsp@claude-plugins-official|Language server para TypeScript / Angular
php|php-lsp@claude-plugins-official|Language server para PHP
go|gopls-lsp@claude-plugins-official|Language server para Go
rust|rust-analyzer-lsp@claude-plugins-official|Language server para Rust
